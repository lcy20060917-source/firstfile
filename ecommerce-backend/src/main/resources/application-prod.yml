# ============================================================
# 生产环境配置 - MySQL
# ============================================================
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ecommerce?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=GMT%2B8&useSSL=false
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-while-idle: true
      validation-query: SELECT 1
      filters: stat,wall

# MyBatis MySQL 方言适配
mybatis:
  configuration:
    database-id: mysql

# 日志级别
logging:
  level:
    com.ecommerce: INFO
    org.apache.shiro: INFO
